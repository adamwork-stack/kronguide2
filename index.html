<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team → Upwork flow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1 class="page-title">Developer network → management pairs → platform</h1>

    <div class="diagram" id="diagram">
      <svg class="feedback-loops" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead-loop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad" />
          </marker>
        </defs>
        <path
          class="loop loop--top"
          d="M 0 0"
          fill="none"
          stroke="#8e44ad"
          stroke-width="2.5"
          marker-end="url(#arrowhead-loop)"
        />
        <path
          class="loop loop--bottom"
          d="M 0 0"
          fill="none"
          stroke="#8e44ad"
          stroke-width="2.5"
          marker-end="url(#arrowhead-loop)"
        />
      </svg>

      <div class="diagram__inner">
        <section class="col col--dev" aria-label="Developers">
          <div class="dev-stack" id="devStack"></div>
        </section>

        <div class="diagram__cluster">
          <div class="bridge bridge--to-teams" id="bridgeArrows" aria-hidden="true"></div>

          <section class="col col--teams" id="teamsCol" aria-label="Project managers and US representatives"></section>

          <section class="col col--platform" aria-label="Platform">
            <div class="box box--upwork">UPWORK</div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
